<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Campaign Intelligence · DM Strategies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/leaflet.css" />
<style>
/* ── Tungsten (licensed NPS display face) ───────────────────── */
@font-face{font-family:'Tungsten';src:url('assets/fonts/TungstenBold.ttf') format('truetype');font-weight:700;font-style:normal;font-display:swap}
@font-face{font-family:'Tungsten';src:url('assets/fonts/TungstenBlack.ttf') format('truetype');font-weight:800 900;font-style:normal;font-display:swap}

:root{
  /* backgrounds */
  --navy:#06111F; --navy-mid:#0A1828; --navy-card:#0D1F33; --navy-tile:#091522; --navy-panel:#0F2140;
  --navy-deep:#040C16;
  /* foreground */
  --fg:#EEF3FB; --fg-muted:#6B87A3; --fg-dim:#3D5268;
  /* accents */
  --teal:#1A8B9A; --teal-lt:#22AABC; --gold:#D4A017; --gold-lt:#F0B82A; --brand-gold:#F2A900; --brand-teal:#003D4C;
  /* party */
  --dem:#2563EB; --dem-lt:#60A5FA; --rep:#DC2626; --rep-lt:#F87171; --npa:#5A6E80;
  --bar-d:#3A6AB8; --bar-r:#E05555; --bar-n:#5A6E80;
  --map-safe-d:#1A3A8C; --map-lean-d:#3A6AB8; --map-tossup:#5A6E80; --map-lean-r:#E05555; --map-safe-r:#CC2222;
  /* status */
  --good:#34D399; --warn:#F0B82A; --bad:#F87171; --violet:#A78BFA;
  /* borders */
  --border:rgba(255,255,255,.07); --border-strong:rgba(255,255,255,.15);
  /* type */
  --ff-display:'Tungsten','Barlow Condensed',Arial,sans-serif; --ff-body:'Outfit',system-ui,sans-serif;
  --ff-mono:'JetBrains Mono','Fira Code',monospace;
  /* motion + radius */
  --d-fast:120ms ease; --d-base:150ms ease; --d-slow:220ms ease; --ease-out:cubic-bezier(.16,1,.3,1);
  --r-xs:2px; --r-chip:3px; --r-sm:4px; --r-md:8px; --r-lg:10px; --r-xl:14px;
  --shadow-tooltip:0 4px 16px rgba(0,0,0,.4); --shadow-popup:0 8px 24px rgba(0,0,0,.5);
  --shadow-card:0 1px 0 rgba(255,255,255,.03),0 12px 30px -22px rgba(0,0,0,.8);
  --camp:#22AABC;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:var(--ff-body);color:var(--fg);font-size:13px;line-height:1.5;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden;
  background:linear-gradient(180deg,#15191F 0%,#10141A 45%,#0C1015 100%);
  background-attachment:fixed}
a{color:inherit;text-decoration:none}
.app{display:flex;flex-direction:column;min-height:100vh}
::selection{background:rgba(34,170,188,.3)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.09);border-radius:6px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.16);background-clip:padding-box}

/* ---------------- header ---------------- */
.header{height:62px;background:linear-gradient(180deg,var(--navy-deep),var(--navy));
  border-bottom:1px solid var(--border);display:flex;align-items:center;
  padding:0 28px;gap:18px;position:sticky;top:0;overflow:hidden;flex-shrink:0;z-index:100}
.header::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(108deg,transparent,transparent 28px,rgba(26,139,154,.045) 28px,rgba(26,139,154,.045) 30px)}
.header::before{content:"";position:absolute;left:0;right:0;bottom:0;height:1px;pointer-events:none;
  background:linear-gradient(90deg,transparent,color-mix(in srgb,var(--camp) 55%,transparent),transparent)}
.header>*{position:relative;z-index:1}
.logo{display:flex;align-items:center;gap:12px}
.logo svg{filter:drop-shadow(0 2px 6px rgba(210,177,110,.18))}
.brand-logo{display:block;height:42px;width:auto}
.brand{font-family:var(--ff-display);font-weight:700;font-size:23px;letter-spacing:3.5px;text-transform:uppercase;color:var(--fg);line-height:1}
.brand em{color:var(--brand-gold);font-style:normal}
.h-div{width:1px;height:30px;background:var(--border-strong)}
.h-title{font-family:var(--ff-display);font-weight:600;font-size:16px;letter-spacing:2px;text-transform:uppercase;color:var(--fg-muted)}
.h-title b{color:var(--fg)}
.h-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.live-row{display:flex;align-items:center;gap:7px;font-family:var(--ff-display);font-weight:600;font-size:11px;
  letter-spacing:2px;text-transform:uppercase;color:var(--fg-muted)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 3px rgba(212,160,23,.14);animation:blink 2.2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.mock-badge{background:rgba(212,160,23,.12);border:1px solid rgba(212,160,23,.28);color:var(--gold-lt);
  font-family:var(--ff-display);font-weight:600;font-size:11px;letter-spacing:2px;text-transform:uppercase;
  padding:5px 12px;border-radius:var(--r-xs)}
.switch{display:flex;gap:0;border:1px solid rgba(255,255,255,.12);border-radius:var(--r-sm);overflow:hidden;background:rgba(0,0,0,.2)}
.switch a{font-family:var(--ff-display);font-weight:600;font-size:11px;letter-spacing:2px;text-transform:uppercase;
  padding:6px 13px;color:var(--fg-muted);transition:background var(--d-fast),color var(--d-fast)}
.switch a:hover{color:var(--fg);background:rgba(255,255,255,.05)}
.switch a.on{background:var(--camp);color:#06111F}

/* ---------------- tabs ---------------- */
.tabs{height:48px;background:linear-gradient(180deg,var(--navy-mid),rgba(10,24,40,.85));
  border-bottom:1px solid var(--border);display:flex;align-items:stretch;
  padding:0 22px;gap:2px;flex-shrink:0;position:sticky;top:62px;z-index:90;overflow-x:auto;scrollbar-width:none;
  backdrop-filter:blur(8px)}
.tabs::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:8px;padding:0 18px;font-family:var(--ff-display);font-weight:600;font-size:15px;
  letter-spacing:2px;text-transform:uppercase;color:var(--fg-muted);cursor:pointer;border-bottom:3px solid transparent;
  white-space:nowrap;transition:color var(--d-base),border-color var(--d-base),background var(--d-base);position:relative}
.tab:hover{color:var(--fg);background:linear-gradient(180deg,transparent,rgba(34,170,188,.06))}
.tab.active{color:var(--teal-lt);border-bottom-color:var(--gold)}
.tab:focus-visible,.btn:focus-visible,.seg-btn:focus-visible,.drawer .x:focus-visible,.prow:focus-visible,tbody tr.click:focus-visible{
  outline:2px solid var(--teal-lt);outline-offset:2px}
.tab-pip{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:0;transform:scale(.4);
  transition:opacity var(--d-base),transform var(--d-base)}
.tab.active .tab-pip{opacity:1;transform:scale(1)}

/* ---------------- subbar (campaign context) ---------------- */
.subbar{display:flex;align-items:center;gap:14px;padding:13px 28px;background:rgba(7,17,30,.55);
  border-bottom:1px solid var(--border);flex-shrink:0;position:relative}
.subbar::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px;background:var(--camp)}
.sb-title{font-family:var(--ff-display);font-weight:700;font-size:21px;letter-spacing:2px;text-transform:uppercase;color:var(--fg);padding-left:8px}
.sb-sub{font-size:11px;color:var(--fg-muted)}
.sb-pill{font-family:var(--ff-display);font-weight:600;font-size:11px;letter-spacing:2px;text-transform:uppercase;
  padding:4px 11px;border-radius:var(--r-xs);background:color-mix(in srgb,var(--camp) 16%,transparent);
  color:color-mix(in srgb,var(--camp) 70%,white);border:1px solid color-mix(in srgb,var(--camp) 40%,transparent)}
.subbar .right{margin-left:auto;font-size:11px;color:var(--fg-dim);font-family:var(--ff-display);letter-spacing:1px;text-transform:uppercase}

/* ---------------- view + page head ---------------- */
.view{padding:30px 28px 80px;max-width:1180px;width:100%;margin:0 auto;animation:fade .35s var(--ease-out)}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.pagehead{margin-bottom:22px;position:relative;padding-left:16px}
.pagehead::before{content:"";position:absolute;left:0;top:3px;bottom:3px;width:4px;border-radius:4px;
  background:linear-gradient(180deg,var(--gold),var(--camp))}
.pagehead h2{font-family:var(--ff-display);font-weight:700;font-size:30px;letter-spacing:1px;text-transform:uppercase;margin:0 0 6px;line-height:1.02}
.pagehead p{margin:0;color:var(--fg-muted);font-size:13px;max-width:82ch;line-height:1.6}

/* ---------------- primitives ---------------- */
.card{background:linear-gradient(180deg,var(--navy-card),color-mix(in srgb,var(--navy-card) 86%,var(--navy-deep)));
  border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--shadow-card)}
.card.pad{padding:18px 20px}
.grid{display:grid;gap:16px}
.section-title{font-family:var(--ff-display);font-weight:600;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--fg-muted);margin:0 0 14px;display:flex;align-items:center;gap:12px}
.section-title .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.muted{color:var(--fg-muted)} .dim{color:var(--fg-dim)}
.right{text-align:right} .center{text-align:center}
.hl{font-weight:700;font-family:var(--ff-display);letter-spacing:.5px}

/* KPI / stat cards */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);
  border-radius:var(--r-md);overflow:hidden;box-shadow:var(--shadow-card)}
.kpi{background:linear-gradient(180deg,var(--navy-card),color-mix(in srgb,var(--navy-card) 88%,var(--navy-deep)));
  padding:16px 18px;position:relative;transition:background var(--d-base)}
.kpi:hover{background:linear-gradient(180deg,color-mix(in srgb,var(--navy-card) 92%,white),var(--navy-card))}
.kpi .lab{font-family:var(--ff-display);font-weight:600;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--fg-muted)}
.kpi .val{font-family:var(--ff-display);font-weight:700;font-size:36px;line-height:1;letter-spacing:.3px;margin-top:9px;
  color:var(--fg);font-variant-numeric:tabular-nums}
.kpi .sub{font-size:10.5px;color:var(--fg-muted);margin-top:6px}
.kpi .bar{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--teal-lt)}
.kpi.r .bar{background:var(--rep-lt)} .kpi.r .val{color:var(--rep-lt)}
.kpi.d .bar{background:var(--bar-d)} .kpi.d .val{color:var(--dem-lt)}
.kpi.u .bar{background:var(--npa)} .kpi.u .val{color:#9fb0c4}
.kpi.m .bar{background:var(--gold)} .kpi.m .val{color:var(--gold-lt)}
.kpi.teal .val{color:var(--teal-lt)} .kpi.gold .val{color:var(--gold-lt)} .kpi.gold .bar{background:var(--gold)}

/* tables */
.tbl-wrap{overflow:auto;border:1px solid var(--border);border-radius:var(--r-md);background:var(--navy-card);box-shadow:var(--shadow-card)}
table{border-collapse:collapse;width:100%;font-size:13px}
thead th{position:sticky;top:0;background:#0B1B2E;text-align:left;font-family:var(--ff-display);font-weight:600;font-size:10px;
  letter-spacing:2px;text-transform:uppercase;color:var(--fg-muted);padding:11px 14px;border-bottom:1px solid var(--border-strong);
  white-space:nowrap;cursor:pointer;user-select:none;z-index:2;transition:color var(--d-fast)}
thead th:hover{color:var(--fg)}
thead th.num{text-align:right}
thead th .ar{opacity:.3;font-size:8px;margin-left:3px}
tbody td{padding:10px 14px;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums;white-space:nowrap;color:var(--fg)}
tbody td.num{text-align:right}
tbody tr{transition:background var(--d-fast)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(34,170,188,.07)}
tbody tr.click{cursor:pointer}
td .nm,td.nm{font-family:var(--ff-display);font-weight:700;font-size:15px;letter-spacing:.3px}
.t-r{color:var(--rep-lt)} .t-d{color:var(--dem-lt)} .t-u{color:#9fb0c4}
.mini{height:5px;border-radius:3px;background:rgba(255,255,255,.06);overflow:hidden;min-width:60px;display:inline-block;vertical-align:middle}
.mini>i{display:block;height:100%;background:var(--teal-lt)}

/* chips / classification tags */
.chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--ff-display);font-weight:600;font-size:11px;letter-spacing:1px;
  text-transform:uppercase;padding:4px 10px;border-radius:var(--r-chip);background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--fg-muted);
  transition:background var(--d-fast),border-color var(--d-fast)}
a.chip:hover{background:rgba(34,170,188,.12);border-color:rgba(34,170,188,.3);color:var(--teal-lt)}
.chip.solid{background:var(--camp);color:#06111F;border-color:var(--camp)}
.tag-Protect,.tag-Build.base,.tag-Build{background:rgba(52,211,153,.12);color:#34D399;border-color:rgba(52,211,153,.3)}
.tag-Turnout.opportunity{background:rgba(240,184,42,.12);color:var(--gold-lt);border-color:rgba(240,184,42,.3)}
.tag-Persuasion.opportunity{background:rgba(34,170,188,.12);color:var(--teal-lt);border-color:rgba(34,170,188,.3)}
.tag-Field-development.opportunity,.tag-Hold.the.line{background:rgba(167,139,250,.12);color:#A78BFA;border-color:rgba(167,139,250,.3)}
.tag-Long.shot,.tag-Data-gap.area{background:rgba(248,113,113,.12);color:var(--rep-lt);border-color:rgba(248,113,113,.3)}

/* badge (walk-list summary) */
.badge{display:inline-flex;align-items:center;gap:7px;font-family:var(--ff-display);font-weight:600;font-size:12px;
  letter-spacing:1.5px;text-transform:uppercase;padding:5px 12px;border-radius:var(--r-sm);
  background:color-mix(in srgb,var(--camp) 14%,transparent);border:1px solid color-mix(in srgb,var(--camp) 36%,transparent);
  color:color-mix(in srgb,var(--camp) 75%,white)}
.badge .dot{width:7px;height:7px;border-radius:50%;background:var(--camp);box-shadow:0 0 0 3px color-mix(in srgb,var(--camp) 22%,transparent)}

/* legend */
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:var(--fg);align-items:center}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend i{width:18px;height:9px;border-radius:2px;display:inline-block}

/* party-balance bar */
.pbar{display:flex;height:48px;border-radius:var(--r-md);overflow:hidden;background:#0F1A2C;border:1px solid var(--border)}
.pbar-seg{display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:1px;min-width:0;overflow:hidden;
  font-family:var(--ff-display);transition:width var(--d-slow) var(--ease-out)}
.pbar-seg span{font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.85}
.pbar-seg b{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.5px}
.pbar-seg.r{background:var(--bar-r)}.pbar-seg.u{background:var(--bar-n)}.pbar-seg.d{background:var(--bar-d)}.pbar-seg.o{background:var(--gold)}
.pbar-legend{display:flex;gap:28px;margin-top:16px;flex-wrap:wrap}
.pbar-legend .it{display:flex;align-items:center;gap:9px}
.pbar-legend i{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.pbar-legend i.r{background:var(--bar-r)}.pbar-legend i.u{background:var(--bar-n)}.pbar-legend i.d{background:var(--bar-d)}.pbar-legend i.o{background:var(--gold)}
.pbar-legend b{font-family:var(--ff-display);font-size:16px;font-variant-numeric:tabular-nums;letter-spacing:.3px}

/* cycle cards (turnout history) */
.cyc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.cyc{position:relative;overflow:hidden;padding:18px 20px;border:1px solid var(--border);border-radius:var(--r-md);
  background:linear-gradient(180deg,var(--navy-card),color-mix(in srgb,var(--navy-card) 86%,var(--navy-deep)));box-shadow:var(--shadow-card);
  transition:transform var(--d-base),border-color var(--d-base)}
.cyc:hover{transform:translateY(-2px);border-color:var(--border-strong)}
.cyc::before{content:"";position:absolute;left:0;right:0;top:0;height:3px}
.cyc.pres::before{background:var(--gold)}.cyc.mid::before{background:var(--teal-lt)}
.cyc-eyebrow{font-family:var(--ff-display);font-weight:600;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--fg-muted)}
.cyc-val{font-family:var(--ff-display);font-weight:700;font-size:36px;line-height:1;margin-top:13px;font-variant-numeric:tabular-nums}
.cyc.pres .cyc-val{color:var(--gold-lt)}.cyc.mid .cyc-val{color:var(--teal-lt)}
.cyc-lab{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--fg-muted);margin-top:5px}
.cyc-bar{height:6px;border-radius:4px;background:rgba(255,255,255,.07);overflow:hidden;margin-top:14px}
.cyc-bar>i{display:block;height:100%;border-radius:4px;transition:width var(--d-slow) var(--ease-out)}
.cyc.pres .cyc-bar>i{background:var(--gold)}.cyc.mid .cyc-bar>i{background:var(--teal-lt)}
.cyc-pri{font-size:11px;color:var(--fg-muted);margin-top:12px;padding-top:11px;border-top:1px solid var(--border)}
@media(max-width:900px){.cyc-grid{grid-template-columns:repeat(2,1fr)}}

/* controls */
.controls{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
select,input[type=text],input[type=number]{font-family:var(--ff-body);font-size:13px;padding:9px 11px;border:1px solid var(--border-strong);
  border-radius:var(--r-sm);background:var(--navy-panel);color:var(--fg);min-width:0;transition:border-color var(--d-fast),box-shadow var(--d-fast)}
select:hover,input:hover{border-color:rgba(255,255,255,.25)}
select:focus,input:focus{outline:none;border-color:var(--teal-lt);box-shadow:0 0 0 3px rgba(34,170,188,.2)}
option{background:var(--navy-mid)}
label.fld{display:flex;flex-direction:column;gap:6px;font-family:var(--ff-display);font-size:10px;font-weight:600;color:var(--fg-muted);
  text-transform:uppercase;letter-spacing:2px}
.btn{font-family:var(--ff-display);font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:10px 16px;
  border-radius:var(--r-sm);cursor:pointer;border:1px solid var(--border-strong);background:var(--navy-panel);color:var(--fg);
  display:inline-flex;align-items:center;gap:7px;transition:background var(--d-fast),border-color var(--d-fast),transform var(--d-fast)}
.btn:hover{background:rgba(34,170,188,.15);border-color:rgba(34,170,188,.4)}
.btn:active{transform:translateY(1px)}
.btn.pri{background:linear-gradient(180deg,var(--teal-lt),var(--teal));border-color:var(--teal-lt);color:#04161b;font-weight:700}
.btn.pri:hover{background:linear-gradient(180deg,#2cc0d3,var(--teal-lt));border-color:var(--teal-lt)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.toggle{display:inline-flex;align-items:center;gap:9px;font-size:13px;color:var(--fg);cursor:pointer;padding:8px 12px;
  border:1px solid var(--border);border-radius:var(--r-sm);background:var(--navy-panel);font-weight:400;transition:border-color var(--d-fast),background var(--d-fast)}
.toggle:hover{border-color:var(--border-strong);background:rgba(34,170,188,.06)}
.toggle input{accent-color:var(--teal-lt)}

/* narrative */
.narr{background:linear-gradient(180deg,rgba(15,26,44,.6),rgba(15,26,44,.3));border:1px solid var(--border);
  border-left:3px solid var(--gold);border-radius:var(--r-md);padding:20px 22px}
.narr h3{font-family:var(--ff-display);margin:0 0 12px;font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;color:var(--gold-lt)}
.narr p{margin:0 0 11px;font-size:13px;color:var(--fg-muted);line-height:1.7}
.narr p:last-child{margin-bottom:0}
.narr b{color:var(--fg);font-weight:600}

/* drawer */
.drawer{position:fixed;top:0;right:0;height:100vh;width:460px;max-width:92vw;
  background:linear-gradient(180deg,var(--navy-mid),var(--navy));
  box-shadow:-12px 0 50px -18px rgba(0,0,0,.8);border-left:1px solid var(--border-strong);z-index:200;
  transform:translateX(100%);transition:transform .26s var(--ease-out);display:flex;flex-direction:column}
.drawer.open{transform:none}
.drawer .dh{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:start;
  background:rgba(0,0,0,.18)}
.drawer .dh b{font-family:var(--ff-display);font-weight:700;font-size:22px;letter-spacing:1px;text-transform:uppercase}
.drawer .db{padding:20px 24px;overflow:auto}
.drawer .db .section-title{margin-top:20px}
.drawer .db .section-title:first-child{margin-top:0}
.drawer .x{cursor:pointer;color:var(--fg-muted);font-size:24px;line-height:1;transition:color var(--d-fast);
  background:none;border:0;padding:0;font-family:inherit}
.drawer .x:hover{color:var(--fg)}
.scrim{position:fixed;inset:0;background:rgba(2,8,16,.6);backdrop-filter:blur(2px);z-index:190;opacity:0;pointer-events:none;transition:opacity .2s}
.scrim.open{opacity:1;pointer-events:auto}

/* empty / note */
.empty{text-align:center;padding:54px 24px;color:var(--fg-muted)}
.empty .ic{font-size:34px;opacity:.6}
.empty h3{font-family:var(--ff-display);margin:16px 0 6px;font-size:20px;letter-spacing:1px;text-transform:uppercase;color:var(--fg)}
.note{display:flex;gap:11px;padding:14px 16px;border-radius:var(--r-md);background:rgba(212,160,23,.08);border:1px solid rgba(212,160,23,.25);
  color:var(--gold-lt);font-size:12.5px;line-height:1.6}
.note.info{background:rgba(34,170,188,.08);border-color:rgba(34,170,188,.28);color:var(--teal-lt)}
.note b{color:var(--fg)}
.note code{font-family:var(--ff-mono);font-size:11px;background:rgba(0,0,0,.3);padding:2px 6px;border-radius:var(--r-xs)}

/* definition list */
.dl{display:grid;grid-template-columns:auto 1fr;gap:9px 16px;font-size:13px}
.dl dt{color:var(--fg-muted);font-weight:400}
.dl dd{margin:0;text-align:right;font-weight:600;font-variant-numeric:tabular-nums;color:var(--fg)}
.coverbar{display:flex;align-items:center;gap:10px}
.coverbar .track{flex:1;height:8px;border-radius:4px;background:rgba(255,255,255,.06);overflow:hidden}
.coverbar .track>i{display:block;height:100%;border-radius:4px;transition:width var(--d-slow) var(--ease-out)}
.scorebar{height:7px;border-radius:4px;background:rgba(255,255,255,.06);overflow:hidden;margin-top:6px}
.scorebar>i{display:block;height:100%;border-radius:4px;transition:width var(--d-slow) var(--ease-out)}
.between{display:flex;justify-content:space-between;align-items:center;gap:12px}
.col{display:flex;flex-direction:column;gap:16px}
.mono{font-family:var(--ff-mono);font-size:11px}
canvas{max-width:100%}

/* map */
#map{height:520px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--navy-tile);z-index:1}
#tmap{height:440px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--navy-tile);z-index:1}
#rmap,#bmap,#gmap,#amap{height:480px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--navy-tile);z-index:1}
#bmap{height:300px}
#gmap{height:420px}
#amap{height:420px}
.ptile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.ptile{border-radius:var(--r-lg);padding:14px 16px;cursor:pointer;transition:transform var(--d-fast)}
.ptile:hover{transform:translateY(-2px)}

/* results: segmented race selector */
.seg{display:inline-flex;border:1px solid var(--border-strong);border-radius:var(--r-sm);overflow:hidden;background:rgba(0,0,0,.22);flex-wrap:wrap}
.seg-btn{font-family:var(--ff-display);font-weight:600;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;padding:10px 17px;
  color:var(--fg-muted);background:transparent;border:0;border-right:1px solid var(--border);cursor:pointer;transition:background var(--d-fast),color var(--d-fast)}
.seg-btn:last-child{border-right:0}
.seg-btn:hover{color:var(--fg);background:rgba(255,255,255,.04)}
.seg-btn.on{background:var(--camp);color:#06111F}
/* results: summary strip */
.rsum{display:grid;grid-template-columns:1.5fr 1fr 1fr 1.1fr;gap:1px;background:var(--border);border:1px solid var(--border);
  border-radius:var(--r-md);overflow:hidden;box-shadow:var(--shadow-card)}
.rsum>div{background:linear-gradient(180deg,var(--navy-card),color-mix(in srgb,var(--navy-card) 88%,var(--navy-deep)));padding:16px 18px}
.rsum .lab{font-family:var(--ff-display);font-weight:600;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--fg-muted)}
.rsum .val{font-family:var(--ff-display);font-weight:700;font-size:28px;line-height:1;margin-top:9px;font-variant-numeric:tabular-nums}
.rsum .sub{font-size:10.5px;color:var(--fg-muted);margin-top:6px}
.rsum .val.d{color:var(--dem-lt)}.rsum .val.r{color:var(--rep-lt)}
.win-pill{display:inline-flex;align-items:center;gap:7px;font-family:var(--ff-display);font-weight:700;font-size:15px;letter-spacing:1px;
  text-transform:uppercase;padding:5px 12px;border-radius:var(--r-sm);margin-top:7px}
.win-pill.r{background:rgba(220,38,38,.14);border:1px solid rgba(220,38,38,.4);color:var(--rep-lt)}
.win-pill.d{background:rgba(37,99,235,.14);border:1px solid rgba(37,99,235,.4);color:var(--dem-lt)}
/* results: town rows */
.tres{padding:12px 14px;border:1px solid var(--border);border-radius:var(--r-sm);background:rgba(15,26,44,.45)}
.tres-nm{font-family:var(--ff-display);font-weight:700;font-size:15px;letter-spacing:.3px}
.tres-m{font-family:var(--ff-display);font-weight:700;font-size:15px;font-variant-numeric:tabular-nums}
.tres-m.d{color:var(--dem-lt)}.tres-m.r{color:var(--rep-lt)}
.tres .pbar{height:30px;margin-top:9px}
.tres .pbar-seg b{font-size:13px}
.swing{font-family:var(--ff-body);font-size:11px;font-weight:600;margin-left:9px;letter-spacing:.3px}
.swing.d{color:var(--dem-lt)}.swing.r{color:var(--rep-lt)}
@media(max-width:900px){.rsum{grid-template-columns:1fr 1fr}}

/* ════════ verdict-first design system (NPS strategy build) ════════ */
:root{
  --navy:#111820; --navy-deep:#080B10; --navy-mid:#161E27; --navy-card:#1B2530; --navy-tile:#111820; --navy-panel:#222C37;
  --fg:#F6F2EA; --fg-muted:#9BA8B5; --fg-dim:#6D7885;
  --teal:#247B83; --teal-lt:#65C8CF; --gold:#C69438; --gold-lt:#E7C772;
  --npa:#6C5DD3; --npa-lt:#B5A7FF;
  --bar-d:#426EAA; --bar-r:#B84A42; --bar-n:#758190;
  --safe-d:#1A3A8C; --likely-d:#3A6AB8; --tossup:#5A6E80; --likely-r:#E05555; --safe-r:#CC2222;
  --border:rgba(246,242,234,.08); --border-strong:rgba(246,242,234,.16); --border-lt:rgba(246,242,234,.18); --hairline:rgba(246,242,234,.045);
  --shadow-card:0 1px 0 rgba(255,255,255,.035),0 24px 60px -42px rgba(0,0,0,.85);

}
.header{height:68px;background:linear-gradient(180deg,#0C1015,#111820);border-bottom:1px solid rgba(246,242,234,.1);padding:0 30px}
.header::after{background:linear-gradient(90deg,transparent,rgba(198,148,56,.05),transparent)}
.header::before{background:linear-gradient(90deg,transparent,color-mix(in srgb,var(--camp) 72%,var(--gold)),transparent)}
.brand-logo{height:40px}
.h-title{font-size:15px;color:var(--fg-muted)}
.mock-badge{background:rgba(198,148,56,.1);border-color:rgba(198,148,56,.3);color:var(--gold-lt)}
.tabs{top:68px;height:52px;background:rgba(17,24,32,.88);backdrop-filter:blur(14px);padding:0 28px}
.tab{font-size:14px;letter-spacing:1.6px;padding:0 20px}
.tab.active{color:var(--fg);border-bottom-color:var(--camp)}
.subbar{background:linear-gradient(90deg,rgba(178,58,46,.08),rgba(22,30,39,.75));padding:12px 30px}
.subbar::before{top:12px;bottom:12px;background:var(--camp)}
.sb-title{font-size:22px}.sb-sub{color:var(--fg-muted)}.sb-pill{background:rgba(178,58,46,.14);border-color:rgba(178,58,46,.35);color:#F1B5AD}
.view{max-width:1280px;padding:34px 30px 86px}
.kicker{font-family:var(--ff-cond);font-weight:600;font-size:10px;letter-spacing:1.55px;text-transform:uppercase;color:var(--fg-muted)}
.h-page{font-family:var(--ff-cond);font-weight:800;font-size:42px;letter-spacing:.2px;text-transform:uppercase;line-height:.96;color:var(--fg);margin-top:6px}
.h-card{font-family:var(--ff-cond);font-weight:650;font-size:10px;letter-spacing:1.75px;text-transform:uppercase;color:var(--fg-muted)}
.num{font-family:var(--ff-cond);font-weight:700;font-variant-numeric:tabular-nums lining-nums;letter-spacing:.3px}
.lede{font-family:var(--ff-body);font-size:12px;line-height:1.45;color:var(--fg-muted)}
.tag{font-family:var(--ff-cond);font-weight:600;font-size:11px;letter-spacing:.8px;text-transform:uppercase}
.vcard,.card{background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.012)),var(--navy-card);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-card)}
.vcard{position:relative;overflow:hidden}
.vcard::before{content:"";position:absolute;left:0;right:0;top:0;height:1px;background:linear-gradient(90deg,transparent,rgba(246,242,234,.22),transparent);pointer-events:none}
.vrow>*,.grid>*,.vcard,.card,.tbl-wrap{min-width:0}
.vhead{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:22px}
.vhead>.kicker{padding:7px 10px;border:1px solid var(--border);border-radius:4px;background:rgba(255,255,255,.03)}
.vrow{display:grid;gap:16px}
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);
  border-radius:var(--r-md);overflow:hidden;margin-top:14px}
.vbanner{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:6px;
  background:rgba(198,148,56,.07);border:1px solid rgba(198,148,56,.2);margin-top:18px}
.prow{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:var(--r-md);cursor:pointer;
  border:1px solid transparent;transition:background var(--d-fast)}
.prow:hover{background:rgba(34,170,188,.07)}
.cartile{aspect-ratio:1;border-radius:3px;transition:transform var(--d-fast)}
.cartile:hover{transform:scale(1.08)}
.section-title{font-size:10px;letter-spacing:1.8px;color:var(--fg-muted)}
.tbl-wrap{background:#18212B}
thead th{background:#151D26;color:var(--fg-muted);letter-spacing:1.5px}
tbody td{color:var(--fg);border-bottom-color:rgba(246,242,234,.06)}
.seg{border-radius:6px;background:rgba(0,0,0,.18)}
.seg-btn{font-size:12px;letter-spacing:1.2px;padding:9px 14px}
.seg-btn.on{background:var(--camp);color:#FFF7EF}
#gmap,#amap,#rmap,#tmap,#map,#bmap,#target-map{border-radius:6px;border-color:rgba(246,242,234,.12)}
#target-map{height:560px;border:1px solid var(--border);background:var(--navy-tile);z-index:1}
.narr{background:linear-gradient(180deg,rgba(246,242,234,.04),rgba(246,242,234,.015));border-color:var(--border);border-left-color:var(--camp)}
.narr h3{color:var(--gold-lt);letter-spacing:1.5px}
.insight-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.insight-strip>div{background:var(--navy-card);padding:15px 16px}
.visual-rule{display:flex;align-items:center;gap:12px;margin:22px 0 12px}
.visual-rule span:first-child{font-size:12px;letter-spacing:2px;color:var(--gold-lt)}
.visual-rule span:last-child{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.route-analysis,.route-targets{max-width:1440px}
.route-analysis .h-page,.route-targets .h-page{font-size:50px}
.route-analysis .h-card,.route-targets .h-card{font-size:11px;letter-spacing:1.9px}
.route-analysis .lede,.route-targets .lede{font-size:13.5px;line-height:1.55;color:#B4BEC9}

.map-shell{padding:20px 22px!important}
.map-head{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px}

.rank-panel .prow{padding:13px 12px}
.rank-panel .num{font-size:18px!important}

.leaflet-container{background:var(--navy-tile)!important}

  font-family:var(--ff-display)!important;font-weight:700!important;box-shadow:var(--shadow-tooltip)!important;border-radius:var(--r-md)!important;padding:8px 12px!important}

/* ════════════════════════ WAR ROOM ════════════════════════
   Persistent command-rail shell + screenshot-faithful surfaces.
   This layer is authoritative — it overrides the earlier design blocks. */
:root{
  --navy:#06111F; --navy-deep:#040A12;
  --rail:#0C1D34; --navy-card:#0F2140; --navy-panel:#15294C; --tray:rgba(15,26,44,.55);
  --fg:#EEF3FB; --fg-muted:#6B87A3; --fg-dim:#3D5268;
  --teal:#1A8B9A; --teal-lt:#22AABC;
  --gold:#D4A017; --gold-lt:#F0B82A;
  --npa:#7C3AED; --npa-lt:#9B6BF0;
  --dem:#2563EB; --dem-lt:#60A5FA; --rep:#DC2626; --rep-lt:#F87171;
  --bar-d:#3A6AB8; --bar-r:#E05555; --bar-n:#5A6E80;
  --border:rgba(255,255,255,.07); --border-strong:rgba(255,255,255,.14); --hairline:rgba(255,255,255,.07);
  --camp:#22AABC;
  --ff-cond:'Tungsten','Barlow Condensed','Oswald',sans-serif;
  --ease-wr:cubic-bezier(.2,.7,.2,1);
}
body{background:var(--navy)!important;background-attachment:fixed}

/* header — 62px persistent chrome */
.header{height:62px!important;background:linear-gradient(180deg,#040A12,#06111F)!important;padding:0 24px!important;border-bottom:1px solid var(--border)!important}
.header::before{background:linear-gradient(90deg,transparent,rgba(34,170,188,.55),transparent)!important}
.header::after{background:repeating-linear-gradient(108deg,transparent,transparent 30px,rgba(34,170,188,.03) 30px,rgba(34,170,188,.03) 32px)!important}
.brand-logo{height:34px}
.h-title{font-size:14px!important;letter-spacing:2.5px;color:var(--fg-muted)}
.live-row{color:var(--fg-dim)}
.live-dot{background:var(--gold);box-shadow:0 0 0 3px rgba(212,160,23,.14)}
.mock-badge{background:transparent!important;border:1px solid rgba(212,160,23,.45)!important;color:var(--gold-lt)!important;border-radius:3px;padding:6px 13px;letter-spacing:2px}

/* tabs — 46px, active = teal text + gold underline + teal pip */
.tabs{height:46px!important;top:62px!important;background:linear-gradient(180deg,#0A1828,rgba(10,24,40,.92))!important;padding:0 22px!important;border-bottom:1px solid var(--border)!important;backdrop-filter:blur(8px)}
.tab{font-size:14px!important;letter-spacing:2px!important;border-bottom-width:2px;color:var(--fg-muted)}
.tab:hover{color:var(--fg);background:linear-gradient(180deg,transparent,rgba(34,170,188,.05))}
.tab.active{color:var(--teal-lt)!important;border-bottom-color:var(--gold)!important}
.tab .tab-pip{background:currentColor}
.tab.active .tab-pip{background:var(--teal-lt)}

/* shell: 340px command rail + body */
.shell{display:grid;grid-template-columns:340px minmax(0,1fr);max-width:1580px;margin:0 auto;width:100%;align-items:start}
.rail{position:sticky;top:108px;align-self:start;min-height:calc(100vh - 108px);
  background:linear-gradient(180deg,#0C1D34,#0A1A30);border-right:1px solid var(--border);
  padding:26px 24px 36px;display:flex;flex-direction:column}
.view{max-width:none!important;margin:0!important;padding:26px 30px 80px!important;min-width:0;animation:fade .35s var(--ease-wr)}

/* rail type + atoms */
.rk{font-family:var(--ff-cond);font-weight:600;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--teal-lt)}
.rt{font-family:var(--ff-cond);font-weight:800;font-size:46px;line-height:.92;letter-spacing:.4px;text-transform:uppercase;color:var(--fg);margin:8px 0 0}
.rsub{font-family:var(--ff-body);font-size:12px;color:var(--fg-muted);margin-top:10px}
.rdiv{height:1px;background:var(--hairline);margin:22px 0}
.rlabel{font-family:var(--ff-cond);font-weight:600;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--fg-muted)}
.rrating{font-family:var(--ff-cond);font-weight:800;font-size:50px;line-height:.9;letter-spacing:.5px;text-transform:uppercase;margin-top:6px}
.rpill{display:inline-flex;align-items:center;gap:6px;margin-top:14px;font-family:var(--ff-cond);font-weight:600;font-size:11px;letter-spacing:1.5px;
  text-transform:uppercase;padding:5px 12px;border-radius:999px;background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.35);color:var(--rep-lt)}
.rcard{background:var(--navy-card);border:1px solid var(--border);border-radius:8px;padding:18px 18px 16px;margin-top:18px}
.r-num{font-family:var(--ff-cond);font-weight:700;font-variant-numeric:tabular-nums lining-nums;letter-spacing:.3px}
.gauge{position:relative;height:14px;border-radius:7px;background:#0A1726;overflow:hidden;margin-top:10px;border:1px solid rgba(255,255,255,.05)}
.gauge .fill{position:absolute;left:0;top:0;bottom:0;transform-origin:left;background:linear-gradient(90deg,var(--teal),var(--teal-lt));border-radius:7px}
.gauge .mark{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--gold-lt);box-shadow:0 0 6px rgba(240,184,42,.6)}
.rsplit{display:flex;height:24px;border-radius:5px;overflow:hidden;margin-top:12px;gap:2px}
.rsplit>span{display:flex;align-items:center;justify-content:center;font-family:var(--ff-cond);font-weight:700;font-size:11px;color:#05121b;min-width:0}
.rbtn{margin-top:auto;display:flex;align-items:center;justify-content:space-between;gap:8px;font-family:var(--ff-cond);font-weight:600;
  font-size:13px;letter-spacing:2px;text-transform:uppercase;padding:13px 16px;border-radius:6px;color:#05121b;
  background:linear-gradient(180deg,var(--teal-lt),var(--teal));border:1px solid var(--teal-lt);transition:filter var(--d-fast),transform var(--d-fast)}
.rbtn:hover{filter:brightness(1.08)}.rbtn:active{transform:translateY(1px)}
.rctx{font-family:var(--ff-body);font-size:11.5px;line-height:1.55;color:var(--fg-muted)}

/* stat-tile atom: label → big Tungsten number → subnote, top 2px accent */
.wpanel{display:grid;gap:16px}
.stat{position:relative;overflow:hidden;background:var(--navy-card);border:1px solid var(--border);border-radius:8px;padding:18px 20px;transition:border-color var(--d-base),transform var(--d-base)}
.stat:hover{border-color:var(--border-strong);transform:translateY(-3px)}
.stat::before{content:"";position:absolute;left:0;right:0;top:0;height:2px;background:var(--accent,var(--teal-lt))}
.stat .sl{font-family:var(--ff-cond);font-weight:600;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent,var(--fg-muted))}
.stat .sv{font-family:var(--ff-cond);font-weight:700;font-size:46px;line-height:1;margin-top:9px;font-variant-numeric:tabular-nums;color:var(--fg)}
.stat .ss{font-family:var(--ff-cond);font-weight:600;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--fg-muted);margin-top:10px;line-height:1.45}

/* tray card (chart / strip surfaces) */
.tray{background:var(--tray);border:1px solid var(--border);border-radius:8px;padding:20px 22px}
.tray-h{display:flex;align-items:center;justify-content:space-between;gap:14px}
.tray-h .ttl{font-family:var(--ff-cond);font-weight:600;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--fg-muted)}
.tray-h .meta{font-family:var(--ff-cond);font-weight:600;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--fg-dim)}

/* path-to-victory segmented bar */
.usplit{display:flex;height:48px;border-radius:6px;overflow:hidden;gap:3px;margin-top:16px}
.usplit>div{display:flex;align-items:center;padding:0 18px;min-width:0;font-family:var(--ff-cond);font-weight:700;font-size:13px;
  letter-spacing:1px;text-transform:uppercase;border-radius:5px;transition:flex .55s var(--ease-wr);overflow:hidden;white-space:nowrap}

/* cycle-margins strip */
.cyc-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.cyc-cell{flex:1;min-width:150px;display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--navy-card);border:1px solid var(--border);border-radius:6px}
.cyc-cell .yr{font-family:var(--ff-cond);font-weight:700;font-size:13px;letter-spacing:1px;color:var(--fg-muted);width:42px;flex-shrink:0}
.cyc-cell .mbar{flex:1;height:8px;border-radius:4px;overflow:hidden;background:#0A1726;position:relative}
.cyc-cell .mbar>i{position:absolute;top:0;bottom:0;border-radius:4px}
.cyc-cell .mval{font-family:var(--ff-cond);font-weight:700;font-size:14px;font-variant-numeric:tabular-nums;width:54px;text-align:right;flex-shrink:0}

.wbtn-bar{animation:none}
@keyframes growb{from{transform:scaleX(0)}to{transform:scaleX(1)}}

/* analysis console: framed map, floating legend, permanent town labels */
.console-card{background:var(--navy-card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.console-head{display:flex;align-items:center;gap:16px;padding:13px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.amap-legend{position:absolute;bottom:16px;left:16px;z-index:600;background:rgba(6,17,31,.86);border:1px solid var(--border);border-radius:6px;padding:12px 14px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.leaflet-tooltip.amap-lbl{background:transparent;border:none;box-shadow:none;padding:0;text-align:center;pointer-events:none}
.leaflet-tooltip.amap-lbl::before{display:none}
.leaflet-tooltip.amap-lbl .n{font-family:var(--ff-cond);font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#EEF3FB;text-shadow:0 1px 3px rgba(0,0,0,.9)}
.leaflet-tooltip.amap-lbl .v{font-family:var(--ff-cond);font-weight:700;font-size:13px;color:var(--gold-lt);text-shadow:0 1px 3px rgba(0,0,0,.9)}
.read-banner{display:flex;align-items:center;gap:22px;background:rgba(26,139,154,.06);border:1px solid rgba(26,139,154,.2);border-radius:8px;padding:18px 22px}
.dpanel-row{display:flex;align-items:baseline;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--hairline)}
.dpanel-row .k{font-family:var(--ff-body);font-size:11px;color:var(--fg-muted)}
@media(max-width:1180px){.console-body{grid-template-columns:1fr!important}.console-body .amap-wrap{border-right:0!important;border-bottom:1px solid var(--border)}}

/* responsive: rail stacks above body */
@media(max-width:1040px){
  .shell{grid-template-columns:1fr}
  .rail{position:static;min-height:0;border-right:0;border-bottom:1px solid var(--border)}
  .rbtn{margin-top:18px}
}
@media(max-width:900px){
  .wpanel.cols-3,.wpanel.cols-4{grid-template-columns:1fr 1fr}
  .stat .sv{font-size:38px}
  .rsum-grid{grid-template-columns:1fr 1fr!important;gap:18px!important}
}
@media(max-width:560px){
  .wpanel{grid-template-columns:1fr!important}
  .view{padding:18px 16px 56px!important}
  .rail{padding:20px 16px 28px}
  .rt{font-size:38px}.rrating{font-size:42px}
}
</style>
</head>
